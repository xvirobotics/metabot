name: MetaBot
options:
  bundleIdPrefix: com.xvirobotics
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  swift-markdown-ui:
    url: https://github.com/gonzalezreal/swift-markdown-ui
    from: 2.4.0

targets:
  MetaBot:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources
    resources:
      - path: Sources/Resources/Fonts
        buildPhase: resources
      - path: Sources/Resources/ringtone.caf
        buildPhase: resources
    info:
      path: Info.plist
      properties:
        UIAppFonts:
          - SpaceGrotesk-Regular.ttf
          - SpaceGrotesk-Medium.ttf
          - SpaceGrotesk-SemiBold.ttf
          - JetBrainsMono-Regular.ttf
        UIBackgroundModes:
          - audio
          - remote-notification
          - voip
        NSMicrophoneUsageDescription: "MetaBot uses the microphone for voice input and voice calls."
        NSSpeechRecognitionUsageDescription: "MetaBot uses speech recognition to convert your voice to text."
        NSCameraUsageDescription: "MetaBot uses the camera to capture and share photos."
        NSPhotoLibraryUsageDescription: "MetaBot accesses your photo library to share images in chat."
        UILaunchScreen:
          UIColorName: ""
          UIImageName: ""
    entitlements:
      path: MetaBot.entitlements
      properties:
        aps-environment: development
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.xvirobotics.MetaBot
        CODE_SIGN_ENTITLEMENTS: MetaBot.entitlements
        SWIFT_VERSION: "5.9"
        SWIFT_STRICT_CONCURRENCY: minimal
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        ENABLE_PREVIEWS: "YES"
        INFOPLIST_FILE: Info.plist
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
    dependencies:
      - package: swift-markdown-ui
        product: MarkdownUI
      - sdk: AVFoundation.framework
      - sdk: CallKit.framework
      - sdk: PushKit.framework
      - sdk: Speech.framework
      - sdk: UserNotifications.framework
    scheme:
      testTargets: []
